name: kenviz
description: "健診結果 OCR ビューア - 完全ローカル処理"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # Camera & Image
  image_picker: ^1.1.0
  image: ^4.5.0

  # Local DB
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0

  # Chart
  fl_chart: ^0.70.2

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # Security
  local_auth: ^2.3.0

  # Sharing
  share_plus: ^10.1.4

  # Navigation
  go_router: ^17.1.0

  # Settings
  shared_preferences: ^2.3.0

  # Utilities
  uuid: ^4.5.0
  intl: ^0.20.2
  collection: ^1.18.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  drift_dev: ^2.22.0

  # Linting
  flutter_lints: ^5.0.0

  # Testing
  mockito: ^5.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/

